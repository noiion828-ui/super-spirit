<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Spirit — Struktur-Synthese — gesperrt</title>
<style>
:root{--holo1:#19e3ff;--holo2:#a855f7;--ink:#e9eefb;--ink2:#9fb0d4;--ink3:#5d6b8e;--line:rgba(120,150,220,.18)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
 background:radial-gradient(900px 600px at 50% -10%,rgba(168,85,247,.14),transparent),#05060d;color:var(--ink)}
.lock{width:min(440px,92vw);border:1px solid var(--line);border-radius:18px;padding:34px 30px;
 background:linear-gradient(180deg,rgba(12,16,32,.8),rgba(8,11,24,.6));text-align:center}
.ic{font-size:2.6rem}
h1{font-size:1.4rem;margin:.4em 0 .1em;background:linear-gradient(110deg,#fff,var(--holo1),var(--holo2));
 -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
p.sub{color:var(--ink2);font-size:.9rem;margin:.2em 0 22px}
input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:rgba(4,6,14,.7);
 color:var(--ink);font-size:1rem;font-family:inherit;outline:none}
input:focus{border-color:var(--holo1);box-shadow:0 0 16px rgba(25,227,255,.25)}
button{margin-top:12px;width:100%;padding:13px;border:none;border-radius:11px;cursor:pointer;font-size:1rem;font-weight:800;
 font-family:inherit;color:#06121e;background:linear-gradient(110deg,var(--holo1),var(--holo2))}
button:hover{filter:brightness(1.1)}
button:disabled{opacity:.6;cursor:wait}
.err{color:#ffb3cf;font-size:.86rem;min-height:1.2em;margin-top:12px}
.hint{color:var(--ink3);font-size:.74rem;margin-top:18px;line-height:1.5}
</style>
</head>
<body>
<form class="lock" id="f" onsubmit="return unlock(event)">
  <div class="ic">🔐</div>
  <h1>Super Spirit — Struktur-Synthese</h1>
  <p class="sub">Inhalt verschluesselt · Passwort eingeben zum Entsperren</p>
  <input id="pw" type="password" placeholder="Passwort" autocomplete="off" autofocus>
  <button id="b" type="submit">Entsperren</button>
  <div class="err" id="e"></div>
  <div class="hint">AES-256-GCM · lokal im Browser entschluesselt · nichts wird gesendet.<br>

</form>
